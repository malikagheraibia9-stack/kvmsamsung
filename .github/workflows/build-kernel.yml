name: Build and Release Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bc build-essential libelf-dev libssl-dev bison flex python3 python-is-python3 rsync zip unzip curl

      - name: Run build script
        run: |
          ./build.sh

      - name: Set Release Tag
        run: |
          echo "RELEASE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Droidspaces-KSUN-SM-A165F-${{ env.RELEASE_TAG }}
          path: dist/*.zip

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: "Kernel Release ${{ env.RELEASE_TAG }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "dist/*.zip"
          allowUpdates: true
          body: "Automated build of Droidspaces-KSUN Kernel.\nCommit: ${{ github.sha }}"
